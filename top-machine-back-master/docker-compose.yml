version: '3.9'

services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./bot/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER} -d ${DB_NAME}']
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - 5432:5432
    networks:
      - internal

  bot:
    build:
      context: .
      dockerfile: bot/Dockerfile
    restart: always
    env_file: .env
    environment:
      DB_HOST: db
    depends_on:
      db:
        condition: service_healthy
    expose:
      - '8081'
    ports:
      - '8081:8081'
    networks:
      - internal

  # yandex-bot — запускается на сервере с 3proxy (185.118.66.80) как процесс, не в Docker
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: always
    env_file: .env
    environment:
      DB_HOST: db
      BOT_INTERNAL_URL: http://bot:8081/internal/notify
    depends_on:
      db:
        condition: service_healthy
      bot:
        condition: service_started
    ports:
      - '8080:8080'
    networks:
      - internal

volumes:
  postgres_data:

networks:
  internal:
    driver: bridge
