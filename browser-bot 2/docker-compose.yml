services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: acc_generator
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    ports:
      - '0.0.0.0:5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $$POSTGRES_USER -d acc_generator']
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build: .
    restart: unless-stopped
    command: server
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: 'postgresql+asyncpg://${DB_USERNAME}:${DB_PASSWORD}@db:5432/acc_generator'
      MAX_PROFILES: 750
      WARMUP_ENABLED: "true"
      PROXY_FILE: proxies.txt
    ports:
      - '${API_PORT:-8001}:8000'
    volumes:
      - profiles:/app/generated_profiles
      - ./proxies.txt:/app/proxies.txt:ro
    shm_size: '2gb'

  captcha-solver:
    build: ./captcha-solver
    restart: unless-stopped
    env_file: ./captcha-solver/.env
    shm_size: '2gb'
    ports:
      - "8080:8080"

  yandex-bot:
    build: ./yandex-bot
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      captcha-solver:
        condition: service_started
    environment:
      DATABASE_URL: 'postgresql+asyncpg://${DB_USERNAME}:${DB_PASSWORD}@db:5432/acc_generator'
      PROXY_FILE: proxies.txt
      MAX_WORKERS: 1
      API_PORT: 8082
      HEADLESS: "false" 
      CAPTCHA_SOLVER_URL: "http://captcha-solver:8080"
      PYTHONUNBUFFERED: "1"
    ports:
      - '127.0.0.1:8082:8082'
    volumes:
      - ./proxies.txt:/app/proxies.txt:ro
    shm_size: '2gb'

  dispatcher:
    build: ./yandex-bot
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      yandex-bot:
        condition: service_started
    command: ["python3", "dispatcher.py"]

volumes:
  pgdata:
  profiles:
