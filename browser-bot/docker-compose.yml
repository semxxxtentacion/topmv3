services:
  # --- PostgreSQL ---
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: acc_generator
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    ports:
      - '0.0.0.0:5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $$POSTGRES_USER -d acc_generator']
      interval: 5s
      timeout: 3s
      retries: 10

  # --- Генератор профилей ---
  app:
    build: .
    restart: unless-stopped
    command: server
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: 'postgresql+asyncpg://${DB_USERNAME}:${DB_PASSWORD}@db:5432/acc_generator'
      MAX_PROFILES: 750
      WARMUP_ENABLED: "true"
      WARMUP_INTERVAL_HOURS: 24
      WARMUP_BATCH_SIZE: 10
      WARMUP_WORKERS: 1
      PROXY_FILE: proxies.txt
    ports:
      - '${API_PORT:-8001}:8000'
    volumes:
      - profiles:/app/generated_profiles
      - ./proxies.txt:/app/proxies.txt:ro
    shm_size: '2gb'

  # --- Воркер ПФ (Бот) ---
  yandex-bot:
    build:
      context: ./yandex-bot
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: 'postgresql+asyncpg://${DB_USERNAME}:${DB_PASSWORD}@db:5432/acc_generator'
      PROXY_FILE: proxies.txt
      MAX_WORKERS: ${MAX_WORKERS:-5}
      API_PORT: 8082
      HEADLESS: "true"
    ports:
      - '127.0.0.1:8082:8082'
    volumes:
      - ./proxies.txt:/app/proxies.txt:ro
      - ./yandex-bot/stealth_metrika.py:/app/stealth_metrika.py:ro
    shm_size: '2gb'

  # --- Диспетчер задач ---
  dispatcher:
    build:
      context: ./yandex-bot
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      yandex-bot:
        condition: service_started
    command: ["python3", "dispatcher.py"]

volumes:
  pgdata:
  profiles:
