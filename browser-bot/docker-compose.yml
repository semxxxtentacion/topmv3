services:
  # --- PostgreSQL ---
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: acc_generator
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    ports:
      - '0.0.0.0:5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $$POSTGRES_USER -d acc_generator']
      interval: 5s
      timeout: 3s
      retries: 10

  # --- API server + warmup scheduler (Генератор профилей) ---
  app:
    build: .
    restart: unless-stopped
    command: server
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: 'postgresql+asyncpg://${DB_USERNAME}:${DB_PASSWORD}@db:5432/acc_generator'
      # Profile limit
      MAX_PROFILES: ${MAX_PROFILES:-1500}
      # Warmup settings
      WARMUP_INTERVAL_HOURS: ${WARMUP_INTERVAL_HOURS:-8}
      WARMUP_BATCH_SIZE: ${WARMUP_BATCH_SIZE:-20}
      WARMUP_WORKERS: ${WARMUP_WORKERS:-3}
      # Proxy (asocks file)
      PROXY_FILE: ${PROXY_FILE:-proxies.txt}
      # Legacy 3proxy (optional)
      PROXY_HOST: ${PROXY_HOST:-}
      PROXY_PORT_FIRST: ${PROXY_PORT_FIRST:-0}
      PROXY_PORT_LAST: ${PROXY_PORT_LAST:-0}
      PROXY_USER: ${PROXY_USER:-}
      PROXY_PASS: ${PROXY_PASS:-}
    ports:
      - '${API_PORT:-8001}:8000'
    volumes:
      - profiles:/app/generated_profiles
      - ./proxies.txt:/app/proxies.txt:ro
    shm_size: '2gb'

  # --- Yandex Bot (воркер ПФ) ---
  yandex-bot:
    build:
      context: ./yandex-bot
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: 'postgresql+asyncpg://${DB_USERNAME}:${DB_PASSWORD}@db:5432/acc_generator'
      PROXY_FILE: ${PROXY_FILE:-proxies.txt}
      MAX_WORKERS: ${MAX_WORKERS:-5}
      API_PORT: 8082
      HEADLESS: "true"
    ports:
      - '127.0.0.1:8082:8082'
    volumes:
      - ./proxies.txt:/app/proxies.txt:ro
      - ./yandex-bot/stealth_metrika.py:/app/stealth_metrika.py:ro
    shm_size: '2gb'

  # --- Диспетчер задач (Связь с бэкендом) ---
  dispatcher:
    build:
      context: ./yandex-bot
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      yandex-bot:
        condition: service_started
    command: ["python3", "dispatcher.py"]

volumes:
  pgdata:
  profiles:
